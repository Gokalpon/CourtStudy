    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PARCELS = [
            { id: 1, name: "Lodumu 28676 Ada 1 Parsel", size: 3737, type: "Sosyal Tesis", images: ["Beytepe-Lodumu-Arsa-28676-1(3737m2)-sosyal-tesis-0.6emsal-1.jpg", "Beytepe-Lodumu-Arsa-28676-1(3737m2)-sosyal-tesis-0.6emsal-2.jpg"] },
            { id: 2, name: "Lodumu 28971 Ada 2 Parsel", size: 3699, type: "Sosyal Kültürel Tesis", images: ["Beytepe-Lodumu-Arsa-28971-2(3699m2)-sosyal-tesis-0.6emsal-1.png", "Beytepe-Lodumu-Arsa-28971-2(3699m2)-sosyal-tesis-0.6emsal-2.png"] },
            { id: 3, name: "Lodumu 28991 Ada 1 Parsel", size: 2699, type: "Sosyal Tesis", images: ["Beytepe-Lodumu-Arsa-28991-1(2699m2)-sosyal-tesis-0.6emsal-1.png", "Beytepe-Lodumu-Arsa-28991-1(2699m2)-sosyal-tesis-0.6emsal-2.png"] },
            { id: 4, name: "Lodumu 407 Ada 1 Parsel", size: 2560, type: "Sosyal Tesis", images: ["Beytepe-Lodumu-Arsa-407-1(2560m2)-sosyal-tesis-0.5emsal-1.png", "Beytepe-Lodumu-Arsa-407-1(2560m2)-sosyal-tesis-0.5emsal-2.png"] },
            { id: 5, name: "Lodumu 28724 Ada 1 Parsel", size: 2383, type: "Sosyal Tesis", images: ["Beytepe-Lodumu-Arsa-287241-1(2383m2)-sosyal-tesis-0.6emsal-1.jpg", "Beytepe-Lodumu-Arsa-287241-1(2383m2)-sosyal-tesis-0.6emsal-2.jpg"] },
            { id: 6, name: "Lodumu 29670 Ada 1 Parsel", size: 1926, type: "Sosyal Kültürel Tesis", images: ["Beytepe-Lodumu-Arsa-29670-1(1926m2)-sosyal-tesis-0.6emsal-1.jpg", "Beytepe-Lodumu-Arsa-29670-1(1926m2)-sosyal-tesis-0.6emsal-2.jpg"] },
            { id: 7, name: "Lodumu 28502 Ada 1 Parsel", size: 6695, type: "Açık Spor Tesisi", images: ["Beytepe-Lodumu-Arsa-28502-1(6695m2)-acikspor-tesis-0.1emsal-2.jpg", "Beytepe-Lodumu-Arsa-28502-1(6695m2)-acikspor-tesis-0.1emsal-2.jpg"] },
            { id: 8, name: "Lodumu 29770 Ada 1 Parsel", size: 5606, type: "Sosyal Tesis", images: ["Beytepe-Lodumu-Arsa-29770-1(5606m2)-sosyal-tesis-0.6emsal-1.png", "Beytepe-Lodumu-Arsa-29770-1(5606m2)-sosyal-tesis-0.6emsal-2.png"] },
            { id: 9, name: "Angora Park 1 Rekreasyon Alanı", size: 9100, type: "Rekreasyon", images: ["Angora Arsa ( Park 1 Rekreasyon Alanı-9100 m2 0.15 kaks).jpg"] },
            { id: 10, name: "Angora Okul Alanı", size: 18000, type: "Okul", images: ["Angora Arsa ( Okul -18.000 m2).jpg"] },
            { id: 11, name: "Beytepe Açık Spor Tesisi 1", size: 20000, type: "Açık Spor", images: ["Beytepe Arsa ( Açık Spor Tesisi Alanı 1 - 20.000 m2).jpg", "Beytepe Arsa 1A.jpg"] },
            { id: 12, name: "Beytepe Açık Spor Tesisi 2", size: 3333, type: "Açık Spor", images: ["Beytepe Arsa ( Açık Spor Tesisi Alanı 2 -3333 m2).jpg", "Beytepe Arsa 2A.jpg"] },
            { id: 13, name: "Beytepe Açık Spor Tesisi 3", size: 5600, type: "Açık Spor", images: ["Beytepe Arsa ( Açık Spor Tesisi Alanı 3 - 5600 m2 ).jpg", "Beytepe Arsa ( Açık Spor Tesisi Alanı 3 - 5600 m2 Parsel Sorgu).jpg"] },
            { id: 14, name: "Ahlatlıbel Bulvar Cephe (78/16)", size: 706, type: "Ticari", images: ["plot_map.png"] },
            { id: 15, name: "Yenikent 1 (42601/1)", size: 3241, type: "Sosyal Tesis", images: ["Yenikent 1-Arsa-42601-1(3241m2)-sosyal-tesis-0.6emsal-1.png", "Yenikent 1-Arsa-42601-1(3241m2)-sosyal-tesis-0.6emsal-2.png"] },
            { id: 16, name: "Çay Yolu 1 (44051/1)", size: 5296, type: "Sosyal Kültürel Alan", images: ["Çay Yolu 1-Arsa-44051-1(5296m2)-sosyal-kulturel-alan-0.5emsal-1.png", "Çay Yolu 1-Arsa-44051-1(5296m2)-sosyal-kulturel-alan-0.5emsal-2.png"] },
            { id: 17, name: "Beytepe Park 1", size: 4472, type: "Park", images: ["Beytepe Arsa (Park 1 - 4472 m2).jpg"] },
            { id: 18, name: "Beytepe Park 2", size: 3200, type: "Park", images: ["Beytepe Arsa (Park 2 - 3200 m2).jpg"] },
            { id: 19, name: "Magna Önü Arsa", size: 2699, type: "Kreş Alanı", images: ["magna-onu-kres.png"] },
            { id: 20, name: "Ahlatlıbel Park 2", size: 2500, type: "Rekreasyon", images: ["ahlatlıbel-2park.png"] }
        ];

        function Dashboard() {
            const [isDark, setIsDark] = useState(true);
            const [selectedImageIndex, setSelectedImageIndex] = useState(0);
            const [isFullscreen, setIsFullscreen] = useState(false);

            const [modelType, setModelType] = useState('bot');
            const [mainChartView, setMainChartView] = useState('cumulative'); // 'sensitivity' or 'cumulative'
            const [selectedParcel, setSelectedParcel] = useState(PARCELS[8]); 
            const [usedLandRatio, setUsedLandRatio] = useState(100);
            const [pricePerSqm, setPricePerSqm] = useState(15000);
            
            const [rentPer1K, setRentPer1K] = useState(50000);     
            const [botRentPer1K, setBotRentPer1K] = useState(5000); 
            const [botYears, setBotYears] = useState(15); 

            const [facilityCapex, setFacilityCapex] = useState(12000000);
            
            const [courtCount, setCourtCount] = useState(4);
            const [hourlyRate, setHourlyRate] = useState(2500);
            const [occupancy, setOccupancy] = useState(35);
            const [racketRatio, setRacketRatio] = useState(80);
            const [racketPrice, setRacketPrice] = useState(125);
            const [cafeSpendPerPerson, setCafeSpendPerPerson] = useState(150);
            
            const [personnelCount, setPersonnelCount] = useState(3);
            const [energyCost, setEnergyCost] = useState(40000);
            const [maintenanceCost, setMaintenanceCost] = useState(25000);
            const [marketingCost, setMarketingCost] = useState(30000);
            const [isTwoStoryCafe, setIsTwoStoryCafe] = useState(false);
            const [analysisOccupancy, setAnalysisOccupancy] = useState(35); 
            const [analysisCourtRate, setAnalysisCourtRate] = useState(2500); 
            const [analysisRacketPrice, setAnalysisRacketPrice] = useState(150); 
            
            const breakdownChartRef = useRef(null);
            const breakdownChartInstance = useRef(null);

            const hoursPerDay = 14;

            useEffect(() => {
                if (isDark) { document.documentElement.classList.add('dark'); } 
                else { document.documentElement.classList.remove('dark'); }
            }, [isDark]);

            // HESAPLAMALAR
            const effectiveSize = selectedParcel.size * (usedLandRatio / 100);
            const landCapex = modelType === 'buy' ? effectiveSize * pricePerSqm : 0;
            const totalCapex = landCapex + facilityCapex; 
            
            const appliedRent1K = modelType === 'bot' ? botRentPer1K : rentPer1K;
            const monthlyRent = modelType === 'buy' ? 0 : (effectiveSize / 1000) * appliedRent1K;
            
            const dailyBookedHours = (hoursPerDay * courtCount) * (occupancy / 100);
            const dailyCourtRevenue = dailyBookedHours * hourlyRate;
            
            const avgRacketsPerBooking = (0.8 * 4) + (0.2 * 2); 
            const dailyRacketRevenue = dailyBookedHours * (racketRatio / 100) * avgRacketsPerBooking * racketPrice;
            
            const dailyVisitors = dailyBookedHours * 4;
            const cafeMultiplier = isTwoStoryCafe ? 1.8 : 1.0; 
            const dailyCafeProfit = dailyVisitors * cafeSpendPerPerson * 0.5 * cafeMultiplier;

            const monthlyRevenue = (dailyCourtRevenue + dailyRacketRevenue + dailyCafeProfit) * 30;
            
            const monthlyPersonnelCost = personnelCount * 40000;
            const fixedOpexTotal = monthlyPersonnelCost + energyCost + maintenanceCost + marketingCost;
            const totalOpex = modelType === 'buy' ? fixedOpexTotal : fixedOpexTotal + monthlyRent;
            
            const ebitda = monthlyRevenue - totalOpex; 
            const corporateTax = ebitda > 0 ? ebitda * 0.25 : 0; 
            const monthlyNetProfit = ebitda - corporateTax;
            const roiMonths = monthlyNetProfit > 0 ? totalCapex / monthlyNetProfit : Infinity;

            const formatTL = (num) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: 0 }).format(num);

            const mainChartRef = useRef(null);
            const mainChartInstance = useRef(null);
            const racketChartRef = useRef(null);
            const racketChartInstance = useRef(null);
            const breakdownChartRef_legacy = useRef(null); // Just for naming conflict avoidance if any


            // Chart.js - Ana Grafik
            useEffect(() => {
                if (!mainChartRef.current) return;
                if (mainChartInstance.current) { mainChartInstance.current.destroy(); }

                const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
                const tickColor = isDark ? '#8e8e93' : '#86868b';

                let labels = [], values = [], barColors = [], yLabel = '';

                if (mainChartView === 'sensitivity') {
                    yLabel = 'Amortisman (Ay)';
                    if (modelType === 'buy') {
                        for (let p = 8000; p <= 40000; p += 8000) {
                            const tCost = (effectiveSize * p) + facilityCapex;
                            const roi = monthlyNetProfit > 0 ? parseFloat((tCost / monthlyNetProfit).toFixed(1)) : 0;
                            labels.push(`${p/1000}k ₺`);
                            values.push(roi);
                            barColors.push('#0071e3');
                        }
                    } else if (modelType === 'rent') {
                        for (let r1k = 20000; r1k <= 300000; r1k += 56000) {
                            const calcRent = (effectiveSize / 1000) * r1k;
                            const preTax = monthlyRevenue - (fixedOpexTotal + calcRent);
                            const mNet = preTax > 0 ? preTax * 0.75 : 0;
                            const roi = mNet > 0 ? parseFloat((facilityCapex / mNet).toFixed(1)) : 0;
                            labels.push(`${Math.round(calcRent/1000)}k`);
                            values.push(roi);
                            barColors.push('#0071e3');
                        }
                    } else {
                        // BOT için hassasiyet: Kira bedeli vs Amortisman
                        for (let br = 1000; br <= 50000; br += 10000) {
                            const calcRent = (effectiveSize / 1000) * br;
                            const preTax = monthlyRevenue - (fixedOpexTotal + calcRent);
                            const mNet = preTax > 0 ? preTax * 0.75 : 0;
                            const roi = mNet > 0 ? parseFloat((facilityCapex / mNet).toFixed(1)) : 0;
                            labels.push(`${Math.round(calcRent/1000)}k`);
                            values.push(roi);
                            barColors.push('#10b981');
                        }
                    }
                } else {
                    // CUMULATIVE VIEW
                    yLabel = 'Nakit Akışı (M TL)';
                    const displayYears = modelType === 'bot' ? botYears : 15;
                    const steps = [];
                    for (let y = 1; y <= displayYears; y += Math.ceil(displayYears / 6)) steps.push(y);
                    if (!steps.includes(displayYears)) steps.push(displayYears);
                    
                    steps.forEach(y => {
                        const initialOutlay = modelType === 'buy' ? landCapex + facilityCapex : facilityCapex;
                        const cum = parseFloat(((monthlyNetProfit * 12 * y - initialOutlay) / 1000000).toFixed(2));
                        labels.push(`${y}. Yıl`);
                        values.push(cum);
                        barColors.push(cum < 0 ? '#ef4444' : (modelType === 'bot' ? '#10b981' : '#0071e3'));
                    });
                }

                mainChartInstance.current = new Chart(mainChartRef.current, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            data: values,
                            backgroundColor: barColors.map(c => c + 'cc'),
                            borderColor: barColors,
                            borderWidth: 2,
                            borderRadius: 8,
                            borderSkipped: false,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: isDark ? '#2c2c2e' : '#fff',
                                titleColor: isDark ? '#fff' : '#1d1d1f',
                                bodyColor: isDark ? '#8e8e93' : '#86868b',
                                borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)',
                                borderWidth: 1,
                                padding: 12,
                                cornerRadius: 12,
                                callbacks: { label: ctx => `${ctx.parsed.y} ${yLabel}` }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { color: tickColor, font: { size: 10, weight: 'bold' } },
                                border: { display: false }
                            },
                            y: {
                                grid: { color: gridColor, drawBorder: false },
                                ticks: { color: tickColor, font: { size: 10 } },
                                border: { display: false },
                                title: { display: true, text: yLabel, color: tickColor, font: { size: 10, weight: 'bold' } }
                            }
                        }
                    }
                });
            }, [modelType, mainChartView, selectedParcel, usedLandRatio, facilityCapex, pricePerSqm, rentPer1K, botRentPer1K, botYears, monthlyNetProfit, monthlyRevenue, fixedOpexTotal, isDark]);

            // Chart.js - Raket Grafik
            useEffect(() => {
                if (!racketChartRef.current) return;
                if (racketChartInstance.current) { racketChartInstance.current.destroy(); }

                const ctx = racketChartRef.current.getContext('2d');
                const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
                const tickColor = isDark ? '#8e8e93' : '#86868b';

                // X-Ekseni: Doluluk Oranı (%10 - %90)
                const occSteps = [10, 20, 30, 40, 50, 60, 70, 80, 90];
                
                // Senaryolar: Düşük Fiyat (-%20), Baz Fiyat (Slider), Yüksek Fiyat (+%20)
                const scenarios = [
                    { label: 'Defansif (Baz -%20)', court: analysisCourtRate * 0.8, racket: analysisRacketPrice * 0.8, color: '#f43f5e' },
                    { label: 'Baz Senaryo', court: analysisCourtRate, racket: analysisRacketPrice, color: '#0071e3' },
                    { label: 'Agresif (Baz +%20)', court: analysisCourtRate * 1.2, racket: analysisRacketPrice * 1.2, color: '#10b981' }
                ];

                const datasets = scenarios.map(sc => {
                    const data = occSteps.map(occ => {
                        const dBooked = (hoursPerDay * courtCount) * (occ / 100);
                        const dCourtRev = dBooked * sc.court;
                        const dRacketRev = dBooked * (racketRatio/100) * avgRacketsPerBooking * sc.racket;
                        const mRev = (dCourtRev + dRacketRev + dailyCafeProfit) * 30;
                        const ebit = mRev - totalOpex;
                        const tax = ebit > 0 ? ebit * 0.25 : 0;
                        return Math.round((ebit - tax) / 1000);
                    });

                    return {
                        label: sc.label,
                        data: data,
                        borderColor: sc.color,
                        backgroundColor: sc.color,
                        borderWidth: 2.5,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                    };
                });

                racketChartInstance.current = new Chart(racketChartRef.current, {
                    type: 'line',
                    data: {
                        labels: occSteps.map(o => `%${o}`),
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { intersect: false, mode: 'index' },
                        plugins: {
                            legend: { 
                                display: true, 
                                position: 'top', 
                                labels: { color: tickColor, boxWidth: 8, usePointStyle: true, font: { size: 10, weight: '600' } }
                            },
                            tooltip: {
                                backgroundColor: isDark ? '#1c1c1e' : '#fff',
                                titleColor: isDark ? '#fff' : '#1d1d1f',
                                bodyColor: isDark ? '#a1a1aa' : '#86868b',
                                padding: 12,
                                cornerRadius: 12,
                                callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}k TL Net Kâr` }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { color: tickColor, font: { size: 10 } },
                                border: { display: false },
                                title: { display: true, text: 'Simüle Doluluk Oranı (%)', color: tickColor, font: { size: 10 } }
                            },
                            y: {
                                grid: { color: gridColor },
                                ticks: { 
                                    color: tickColor, 
                                    callback: (val) => val >= 1000 ? (val/1000).toFixed(1) + 'M' : val + 'k'
                                },
                                border: { display: false },
                                title: { display: true, text: 'Aylık Net Kâr', color: tickColor, font: { size: 10, weight: 'bold' } }
                            }
                        }
                    }
                });
            }, [courtCount, analysisCourtRate, analysisRacketPrice, racketRatio, dailyCafeProfit, totalOpex, isDark]);

            // Chart.js - Breakdown (Detaylı Ayrışım)
            useEffect(() => {
                if (!breakdownChartRef.current) return;
                if (breakdownChartInstance.current) { breakdownChartInstance.current.destroy(); }

                const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
                const tickColor = isDark ? '#8e8e93' : '#86868b';

                const displayYears = 15;
                const labels = [];
                const courtRevData = [], racketRevData = [], cafeRevData = [];
                const rentData = [], personnelData = [], opexData = [], taxData = [];

                for (let y = 1; y <= displayYears; y++) {
                    const growthFactor = Math.pow(1.05, y - 1); // %5 Yıllık Gelir Artışı
                    const inflationFactor = Math.pow(1.03, y - 1); // %3 Yıllık Gider Artışı
                    
                    const yrCourt = (dailyCourtRevenue * 30 * 12 * growthFactor) / 1000000;
                    const yrRacket = (dailyRacketRevenue * 30 * 12 * growthFactor) / 1000000;
                    const yrCafe = (dailyCafeProfit * 30 * 12 * growthFactor) / 1000000;
                    
                    const yrRent = (monthlyRent * 12 * inflationFactor) / 1000000;
                    const yrPersonnel = (monthlyPersonnelCost * 12 * inflationFactor) / 1000000;
                    const yrFixed = ((energyCost + maintenanceCost + marketingCost) * 12 * inflationFactor) / 1000000;
                    
                    const yrEbitda = (yrCourt + yrRacket + yrCafe) - (yrRent + yrPersonnel + yrFixed);
                    const yrTax = yrEbitda > 0 ? yrEbitda * 0.25 : 0;

                    labels.push(`${y}. Yıl`);
                    courtRevData.push(yrCourt);
                    racketRevData.push(yrRacket);
                    cafeRevData.push(yrCafe);
                    rentData.push(-yrRent);
                    personnelData.push(-yrPersonnel);
                    opexData.push(-yrFixed);
                    taxData.push(-yrTax);
                }

                breakdownChartInstance.current = new Chart(breakdownChartRef.current, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [
                            { label: 'Saha Geliri', data: courtRevData, backgroundColor: '#0071e3', stack: 'Stack 0' },
                            { label: 'Raket Geliri', data: racketRevData, backgroundColor: '#f97316', stack: 'Stack 0' },
                            { label: 'Kafe Geliri', data: cafeRevData, backgroundColor: '#8b5cf6', stack: 'Stack 0' },

                                    </div>
                                    <div class="text-left md:text-right">
                                        <div class="text-apple-secondary dark:text-apple-darkSecondary text-[13px] font-semibold mb-2 uppercase tracking-tight">
                                            ROI: Amortisman Hızı
                                        </div>
                                        <div class="text-4xl font-bold tracking-tight text-apple-blue flex items-baseline gap-1">
                                            {monthlyNetProfit > 0 ? (
                                                <>{roiMonths.toFixed(1)} <span class="text-xl font-semibold text-apple-blue/70">Ay</span></>
                                            ) : (
                                                <span class="text-red-500 text-2xl">--</span>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div class="flex flex-col sm:flex-row justify-between sm:items-center bg-gray-50 dark:bg-[#1a1a1c] px-5 py-3 rounded-xl border border-apple-border/30 dark:border-[#2c2c2e] mb-8 relative z-10">
                                    <span class="text-apple-secondary dark:text-[#a1a1aa] font-semibold text-[13px]">Vergi Öncesi Kâr (EBITDA): <span class="text-apple-text dark:text-white">{formatTL(ebitda)}</span></span>
                                    <span class="text-red-500 font-semibold text-[13px] mt-2 sm:mt-0">- Yasal Vergi (%25): {formatTL(corporateTax)}</span>
                                </div>

                                {modelType === 'bot' && monthlyNetProfit > 0 && (
                                    <div class="bg-emerald-500/10 dark:bg-emerald-500/10 border border-emerald-500/20 dark:border-emerald-500/20 rounded-2xl p-6 mb-8 relative z-10 flex flex-col md:flex-row items-center justify-between">
                                        <div>
                                            <div class="flex items-center gap-2 mb-1">
                                                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                                <h4 class="text-emerald-700 dark:text-emerald-400 font-bold uppercase text-xs tracking-wider">
                                                    YİD {botYears} Yıllık Sözleşme Getirisi
                                                </h4>
                                            </div>
                                            <p class="text-[12px] text-emerald-800/70 dark:text-emerald-300/70 max-w-sm">
                                                Sözleşme sonunda (yatırdığınız {formatTL(totalCapex)} maliyet düşüldükten sonra) tamamen size kalacak garantili kâr havuzu.
                                            </p>
                                        </div>
                                        <div class="mt-4 md:mt-0 text-right">
                                            <div class="text-3xl font-black text-emerald-700 dark:text-emerald-400">
                                                {formatTL((monthlyNetProfit * 12 * botYears) - facilityCapex)}
                                            </div>
                                            <div class="text-xs text-emerald-600/70 dark:text-emerald-500 mt-1 uppercase font-semibold">Net Servet Birikimi (Milyon TL)</div>
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            {/* PREMIUM CHART.JS X/Y GRAFİKLERİ */}
                            <div class="grid grid-cols-1 gap-8">
                                
                                {/* Ana Bar Grafik */}
                                <div class="bg-apple-card dark:bg-[#1c1c1e] rounded-[28px] p-8 shadow-apple dark:shadow-none border border-apple-border/20 dark:border-apple-darkBorder flex flex-col">
                                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                                        <div>
                                            <h3 class="text-lg font-extrabold tracking-tight text-apple-text dark:text-white uppercase flex items-center gap-2">
                                                <i data-lucide={mainChartView === 'sensitivity' ? "gauge" : "trending-up"} class="w-5 h-5 text-apple-blue"></i>
                                                {mainChartView === 'sensitivity' ? (modelType === 'buy' ? "Giriş Fiyatı Analizi" : "Kira Sensitivite Analizi") : "Kümülatif Servet Projeksiyonu (15 Yıl)"}
                                            </h3>
                                            <p class="text-[12px] text-apple-secondary dark:text-apple-darkSecondary mt-1 font-medium italic">
                                                {mainChartView === 'sensitivity' ? "Sektörel maliyet değişkenlerine göre amortisman hızı." : "İşletme ömrü boyunca biriken toplam nakit rezervi."}
                                            </p>
                                        </div>
                                        <div class="flex p-1 bg-apple-segmentedBg dark:bg-[#2c2c2e] rounded-xl border border-apple-border/10">
                                            <button 
                                                onClick={() => setMainChartView('sensitivity')}
                                                class={`px-6 py-2 text-[11px] font-bold rounded-lg transition-all ${mainChartView === 'sensitivity' ? 'bg-white dark:bg-[#48484a] text-apple-text dark:text-white shadow-md' : 'text-apple-secondary hover:text-apple-text'}`}>
                                                Hassasiyet
                                            </button>
                                            <button 
                                                onClick={() => setMainChartView('cumulative')}
                                                class={`px-6 py-2 text-[11px] font-bold rounded-lg transition-all ${mainChartView === 'cumulative' ? 'bg-white dark:bg-[#48484a] text-apple-text dark:text-white shadow-md' : 'text-apple-secondary hover:text-apple-text'}`}>
                                                Kümülatif
                                            </button>
                                        </div>
                                    </div>
                                    <div style={{ height: '350px', position: 'relative' }}>
                                        <canvas ref={mainChartRef}></canvas>
                                    </div>
                                </div>

                                {/* Saha + Raket Hassasiyet (Line) Grafik */}
                                <div class="bg-apple-card dark:bg-[#1c1c1e] rounded-[28px] p-8 shadow-apple dark:shadow-none border border-apple-border/20 dark:border-apple-darkBorder flex flex-col">
                                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                                        <div>
                                            <h3 class="text-lg font-extrabold tracking-tight text-apple-text dark:text-white uppercase flex items-center gap-2">
                                                <i data-lucide="bar-chart-3" class="w-5 h-5 text-red-500"></i>
                                                Saha & Raket Gelir Sensitivite Matrisi
                                            </h3>
                                            <p class="text-[12px] text-apple-secondary dark:text-apple-darkSecondary mt-1 font-medium italic">
                                                Saha ücreti ve raket kirası kombinasyonlarının operasyonel net kâra yansıması.
                                            </p>
                                        </div>
                                        
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full md:w-auto">
                                            <div class="bg-apple-bg dark:bg-[#2c2c2e] p-4 rounded-2xl border border-apple-border/20">
                                                <div class="flex justify-between items-center mb-2">
                                                    <span class="text-[10px] font-extrabold text-apple-secondary uppercase tracking-tight">Saha Kirası (S)</span>
                                                    <span class="text-xs font-bold text-apple-blue font-mono">{formatTL(analysisCourtRate)}</span>
                                                </div>
                                                <input type="range" min="1500" max="5000" step="100" class="w-full h-1 bg-apple-border dark:bg-apple-darkBorder rounded-lg appearance-none cursor-pointer accent-apple-blue" value={analysisCourtRate} onChange={(e) => setAnalysisCourtRate(Number(e.target.value))} />
                                            </div>

                                            <div class="bg-apple-bg dark:bg-[#2c2c2e] p-4 rounded-2xl border border-apple-border/20">
                                                <div class="flex justify-between items-center mb-2">
                                                    <span class="text-[10px] font-extrabold text-apple-secondary uppercase tracking-tight">Raket Kirası (R)</span>
                                                    <span class="text-xs font-bold text-orange-500 font-mono">{formatTL(analysisRacketPrice)}</span>
                                                </div>
                                                <input type="range" min="50" max="300" step="10" class="w-full h-1 bg-apple-border dark:bg-apple-darkBorder rounded-lg appearance-none cursor-pointer accent-orange-500" value={analysisRacketPrice} onChange={(e) => setAnalysisRacketPrice(Number(e.target.value))} />
                                            </div>

                                            <div class="bg-apple-bg dark:bg-[#2c2c2e] p-4 rounded-2xl border border-apple-border/20">
                                                <div class="flex justify-between items-center mb-2">
                                                    <span class="text-[10px] font-extrabold text-apple-secondary uppercase tracking-tight">Doluluk Noktası (%)</span>
                                                    <span class="text-xs font-bold text-emerald-500 font-mono">%{analysisOccupancy}</span>
                                                </div>
                                                <input type="range" min="10" max="90" step="5" class="w-full h-1 bg-apple-border dark:bg-apple-darkBorder rounded-lg appearance-none cursor-pointer accent-emerald-500" value={analysisOccupancy} onChange={(e) => setAnalysisOccupancy(Number(e.target.value))} />
                                            </div>
                                        </div>
                                    </div>
                                    <div style={{ height: '400px', position: 'relative' }}>
                                        <canvas ref={racketChartRef}></canvas>
                                    </div>
                                    <div class="mt-6 p-4 bg-gray-50 dark:bg-black/20 rounded-xl border border-apple-border/10 flex items-center gap-3">
                                        <i data-lucide="info" class="w-4 h-4 text-apple-blue"></i>
                                        <p class="text-[11px] text-apple-secondary dark:text-apple-darkSecondary leading-tight">
                                            *X ekseni doluluk oranını temsil eder. <b>Saha ve Raket slider'larını</b> kullanarak "Baz Senaryo" fiyatlarını belirleyebilirsiniz. Grafik, bu fiyatların %20 altı ve üstü için kârlılık eğrilerini anlık olarak çizer.
                                        </p>
                                    </div>
                                </div>

                                {/* Chart 3: Detaylı Analiz Breakdown */}
                                <div class="bg-apple-card dark:bg-[#1c1c1e] rounded-[28px] p-8 shadow-apple dark:shadow-none border border-apple-border/20 dark:border-apple-darkBorder flex flex-col">
                                    <div class="mb-10">
                                        <h3 class="text-lg font-extrabold tracking-tight text-apple-text dark:text-white uppercase flex items-center gap-2">
                                            <i data-lucide="pie-chart" class="w-5 h-5 text-purple-500"></i>
                                            Yıllık Finansal Anatomi & Dağılım (15 Yıl)
                                        </h3>
                                        <p class="text-[12px] text-apple-secondary dark:text-apple-darkSecondary mt-1 font-medium italic">
                                            Gelir ve gider kalemlerinin yıllara göre projeksiyonu (%5 büyüme ve %3 inflation düzeltmeli).
                                        </p>
                                    </div>

                                    <div class="flex flex-col lg:flex-row gap-10">
                                        <div class="flex-1" style={{ height: '450px', position: 'relative' }}>
                                            <canvas ref={breakdownChartRef}></canvas>
                                        </div>
                                        
                                        <div class="lg:w-72 space-y-4">
                                            <div class="p-4 bg-gray-50 dark:bg-black/20 rounded-2xl border border-apple-border/10">
                                                <div class="text-[10px] font-bold text-apple-secondary uppercase mb-1">Yıllık Brüt Ciro</div>
                                                <div class="text-xl font-bold text-apple-text dark:text-white">{formatTL(monthlyRevenue * 12)}</div>
                                            </div>
                                            <div class="p-4 bg-gray-50 dark:bg-black/20 rounded-2xl border border-apple-border/10">
                                                <div class="text-[10px] font-bold text-apple-secondary uppercase mb-1">Yıllık Toplam Gider</div>
                                                <div class="text-xl font-bold text-red-500">{formatTL(totalOpex * 12)}</div>
                                            </div>
                                            <div class="p-4 bg-gray-50 dark:bg-black/20 rounded-2xl border border-apple-border/10">
                                                <div class="text-[10px] font-bold text-apple-secondary uppercase mb-1">Vergi Yükü (Yıllık)</div>
                                                <div class="text-xl font-bold text-gray-500">{formatTL(corporateTax * 12)}</div>
                                            </div>
                                            <div class="p-6 bg-apple-blue rounded-[20px] shadow-lg shadow-apple-blue/20">
                                                <div class="text-[10px] font-bold text-white/70 uppercase mb-1 tracking-wider">Yıllık Net Kâr</div>
                                                <div class="text-2xl font-black text-white">{formatTL(monthlyNetProfit * 12)}</div>
                                            </div>
                                            
                                            <div class="pt-4 border-t border-apple-border/20 dark:border-white/5">
                                                <div class="flex items-center gap-2 text-[11px] font-semibold text-apple-secondary uppercase">
                                                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                                                    Sektörel Reel Verim
                                                </div>
                                                <div class="mt-1 text-[11px] text-apple-secondary/70 italic leading-tight">
                                                    *15 yıllık projeksiyonda kira artışları ve personel yükü %3, genel gelirler ise %5 yıllık ivme ile hesaplanmaktadır.
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {isFullscreen && (
                        <div class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center p-4 sm:p-8" onClick={() => setIsFullscreen(false)}>
                            <button 
                                class="absolute top-6 right-6 p-2 bg-white/10 hover:bg-white/20 rounded-full text-white transition z-50"
                                onClick={() => setIsFullscreen(false)}
                            >
                                <i data-lucide="x" class="w-6 h-6"></i>
                            </button>
                            
                            <img 
                                src={selectedParcel.images[selectedImageIndex] || selectedParcel.images[0]} 
                                class="max-w-full max-h-full object-contain rounded-xl shadow-2xl" 
                                onClick={(e) => e.stopPropagation()}
                            />
                            
                            {selectedParcel.images.length > 1 && (
                                <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-2 bg-black/80 backdrop-blur-xl rounded-full p-2 border border-white/20" onClick={(e) => e.stopPropagation()}>
                                    {selectedParcel.images.map((_, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => setSelectedImageIndex(idx)}
                                            class={`w-12 h-12 flex items-center justify-center rounded-full text-lg font-bold transition-all ${selectedImageIndex === idx ? 'bg-white text-black scale-110' : 'text-white hover:bg-white/20'}`}
                                        >
                                            {idx + 1}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
